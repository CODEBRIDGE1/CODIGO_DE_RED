user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;

    # ──────────────────────────────────────────────────────
    # Docker DNS resolver
    # Usar el DNS embebido de Docker (127.0.0.11) para que
    # nginx resuelva los hostnames en tiempo de request y
    # no falle al arrancar si un contenedor aún no está listo.
    # ──────────────────────────────────────────────────────
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ──────────────────────────────────────────────────────
    # HTTP → HTTPS redirect
    # ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name idepro.app www.idepro.app;

        # Permite renovar certificados Let's Encrypt sin downtime
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ──────────────────────────────────────────────────────
    # HTTPS principal
    # ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name idepro.app www.idepro.app;

        # Certificados Let's Encrypt
        ssl_certificate     /etc/letsencrypt/live/idepro.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/idepro.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options            "SAMEORIGIN"              always;
        add_header X-Content-Type-Options     "nosniff"                 always;
        add_header X-XSS-Protection           "1; mode=block"           always;
        add_header Referrer-Policy            "no-referrer-when-downgrade" always;

        # Variables para resolución DNS en tiempo de request (no al arrancar nginx).
        # Esto evita "host not found in upstream" cuando los contenedores aún
        # no están en el DNS de Docker al momento de iniciar nginx.
        set $upstream_api      "api:8000";
        set $upstream_frontend "frontend:5173";
        set $upstream_minio    "minio:9000";

        # $public_host captura el host real del cliente ANTES de que proxy_pass
        # lo sobreescriba. Con proxy_pass http://$var/path; nginx puede cambiar
        # el valor de $host en el contexto del upstream; fijándolo aquí garantizamos
        # que MinIO recibe siempre "idepro.app" en el Host header (necesario para
        # verificar la firma de las presigned URLs).
        set $public_host $host;

        # ── MinIO buckets ────────────────────────────────
        # IMPORTANTE: proxy_pass usa $request_uri (no path literal) para que nginx
        # no trunque el path ni el query string (X-Amz-Signature, etc.).
        # Con proxy_pass + variable + path literal, nginx usa HTTP/1.0 y omite
        # la query string → MinIO recibe GET /bucket/ sin firma → 403 AccessDenied.
        location /avatars/ {
            proxy_pass         http://$upstream_minio$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $public_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /documentos/ {
            proxy_pass         http://$upstream_minio$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $public_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /evidencias/ {
            proxy_pass         http://$upstream_minio$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $public_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /reportes/ {
            proxy_pass         http://$upstream_minio$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $public_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── API Backend ──────────────────────────────────
        location /api/ {
            proxy_pass         http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        location /docs {
            proxy_pass         http://$upstream_api/docs;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /redoc {
            proxy_pass         http://$upstream_api/redoc;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /openapi.json {
            proxy_pass         http://$upstream_api/openapi.json;
            proxy_set_header   Host              $host;
        }

        location /health {
            proxy_pass         http://$upstream_api/health;
            access_log off;
        }

        # ── Frontend (SPA) ───────────────────────────────
        location /assets/ {
            proxy_pass         http://$upstream_frontend/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass         http://$upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
